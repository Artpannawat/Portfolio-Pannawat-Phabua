      <title>Luxurious Personal Web Portfolio</title>
      
      <!-- Favicon with cache busting (version query string) -->
      <!-- Standard favicon for modern browsers -->
      <link rel="icon" type="image/png" sizes="32x32" href="/ART-Portfolio.png?v=3" />
      <link rel="icon" type="image/png" sizes="16x16" href="/ART-Portfolio.png?v=3" />
      
      <!-- Shortcut icon for older browsers (IE compatibility) -->
      <link rel="shortcut icon" href="/ART-Portfolio.png?v=3" type="image/png" />
      
      <!-- Apple Touch Icon for iOS home screen (iPhone/iPad) -->
      <link rel="apple-touch-icon" sizes="180x180" href="/ART-Portfolio.png?v=3" />
      
      <!-- Android Chrome theme color (matches dark theme) -->
      <meta name="theme-color" content="#0a0a0f" />
      
      <!-- Preload favicon to reduce layout shift and ensure priority loading -->
      <link rel="preload" href="/ART-Portfolio.png?v=3" as="image" />
